<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>你好</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --btn: rgba(255, 255, 255, 0.1);
        --btn-hover: rgba(255, 255, 255, 0.16);
        --border: rgba(255, 255, 255, 0.14);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: rgba(0, 0, 0, 0.04);
          --text: rgba(0, 0, 0, 0.88);
          --muted: rgba(0, 0, 0, 0.6);
          --btn: rgba(0, 0, 0, 0.06);
          --btn-hover: rgba(0, 0, 0, 0.1);
          --border: rgba(0, 0, 0, 0.12);
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 800px at 10% 10%, rgba(99, 102, 241, 0.18), transparent 60%),
          radial-gradient(900px 700px at 90% 20%, rgba(16, 185, 129, 0.14), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      .card {
        width: min(720px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 14px 0;
        font-size: 40px;
        letter-spacing: 0.02em;
      }

      p {
        margin: 0 0 18px 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      @media (max-width: 560px) {
        .actions {
          grid-template-columns: 1fr;
        }
      }

      a.button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--btn);
        color: inherit;
        text-decoration: none;
        font-weight: 600;
        transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
        user-select: none;
      }

      a.button:hover {
        background: var(--btn-hover);
        border-color: rgba(255, 255, 255, 0.22);
        transform: translateY(-1px);
      }

      a.button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>你好</h1>
      <p>这里是ZhangHB_321688！</p>
      <section class="actions" aria-label="导航">
        <a class="button" href="https://space.bilibili.com/488486599" target="_blank" rel="noreferrer">B站主页</a>
        <a class="button" href="https://github.com/ZhangHB-321688/ZhangHB-321688.github.io" target="_blank" rel="noreferrer"
          >GitHub 仓库</a
        >
        <a class="button" href="./toolbox.html">好玩的东西！</a>
      </section>
    </main>
  </body>
</html>
