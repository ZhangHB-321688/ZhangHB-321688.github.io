<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旗帜编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 左上角功能按钮 -->
    <div class="top-menu">
        <button id="menuButton" class="menu-button">☰</button>
        <div id="menuDropdown" class="menu-dropdown" style="display: none;">
            <div class="menu-item" id="copyFlagItem">复制选中旗帜</div>
            <div class="menu-item" id="exportFlagItem">导出选中旗帜至剪贴板</div>
            <div class="menu-item" id="importFlagItem">从剪贴板导入旗帜</div>
            <div class="menu-separator"></div>
            <div class="menu-item" id="exportPanelItem">导出整个面板</div>
            <div class="menu-item" id="importPanelItem">导入面板数据</div>
            <div class="menu-separator"></div>
            <div class="menu-item" id="generateMinecraftItem">生成Minecraft命令</div>
            <div class="menu-item" id="exportToShulkerBoxItem">导出所有旗帜至潜影盒</div>
            <div class="menu-item" id="clearScreenItem">清屏</div>
            <div class="menu-separator"></div>
            <div class="menu-item"><a href="../toolbox.html">返回工具箱</a></div>
        </div>
    </div>
    
    <!-- 顶部图案显示区域 -->
    <div id="patternDisplay" class="pattern-display" style="display: none;">
        <h4>当前旗帜图案</h4>
        <div id="patternIcons" class="pattern-icons"></div>
    </div>
    
    <!-- 图形化编辑界面 -->
    <div id="graphicalEditor" class="graphical-editor">
        <div class="editor-content">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <!-- 图案按钮区域 -->
                <div class="pattern-section">
                    <h4>图案</h4>
                    <div id="patternButtons" class="pattern-buttons"></div>
                </div>
                
                <!-- 颜色按钮区域 -->
                <div class="color-section">
                    <h4>颜色</h4>
                    <div id="colorButtons" class="color-buttons"></div>
                </div>
            </div>
            
            <!-- 操作按钮区域 -->
            <div class="action-section">
                <button id="addBlockBtn" class="add-btn">添加旗帜</button>
                <button id="editBackgroundBtn" class="reset-btn">编辑背景颜色</button>
                <button id="deleteLastPattern" class="delete-btn">删除最后图案</button>
                <button id="deleteBlock" class="delete-btn">删除选中旗帜</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    
    <!-- 确认对话框 -->
    <div id="confirmDialog" class="confirm-dialog" style="display: none;">
        <div class="confirm-content">
            <h3 id="confirmTitle">确认操作</h3>
            <p id="confirmMessage">您确定要执行此操作吗？</p>
            <div class="confirm-buttons">
                <button id="confirmYes" class="confirm-btn yes-btn">确定</button>
                <button id="confirmNo" class="confirm-btn no-btn">取消</button>
            </div>
        </div>
    </div>
</body>
</html>
