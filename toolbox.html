<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工具箱……不一定是工具</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --btn: rgba(255, 255, 255, 0.1);
        --btn-hover: rgba(255, 255, 255, 0.16);
        --border: rgba(255, 255, 255, 0.14);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: rgba(0, 0, 0, 0.04);
          --text: rgba(0, 0, 0, 0.88);
          --muted: rgba(0, 0, 0, 0.6);
          --btn: rgba(0, 0, 0, 0.06);
          --btn-hover: rgba(0, 0, 0, 0.1);
          --border: rgba(0, 0, 0, 0.12);
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 800px at 10% 10%, rgba(99, 102, 241, 0.18), transparent 60%),
          radial-gradient(900px 700px at 90% 20%, rgba(16, 185, 129, 0.14), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      .card {
        width: min(860px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        backdrop-filter: blur(10px);
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: 0.02em;
      }

      a.back {
        color: inherit;
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--btn);
        font-weight: 600;
        transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
      }

      a.back:hover {
        background: var(--btn-hover);
        transform: translateY(-1px);
      }

      a.back:active {
        transform: translateY(0);
      }

      p {
        margin: 12px 0 18px 0;
        color: var(--muted);
        line-height: 1.6;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      a.item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--btn);
        color: inherit;
        text-decoration: none;
        font-weight: 600;
        transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
      }

      a.item:hover {
        background: var(--btn-hover);
        transform: translateY(-1px);
      }

      a.item:active {
        transform: translateY(0);
      }

      .hint {
        font-weight: 500;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <header>
        <h1>好玩的东西！</h1>
        <a class="back" href="./index.html">返回主页</a>
      </header>
      <p>都是我写的好东西！</p>
      <ul aria-label="链接">
        <li><a class="item" href="./trialAlgo/index.html" target="_blank" rel="noreferrer">终末地选剑演武最优策略计算器<span class="hint">点击打开</span></a></li>
      </ul>
    </main>
  </body>
</html>
